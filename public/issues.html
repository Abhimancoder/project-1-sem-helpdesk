<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Issues Tracker - EduDesk AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --cream: #f7f4ee; --warm-white: #fdfcf9; --ink: #1a1814;
      --ink-soft: #3d3a34; --ink-muted: #7a766d;
      --teal: #2a7f6f; --teal-light: #3fa08e; --teal-pale: #e8f5f2;
      --amber: #d4803a; --amber-pale: #fdf0e3; --sand: #e8e2d6;
      --red: #dc3545; --green: #28a745; --yellow: #ffc107;
      --font-display: 'Sora', sans-serif; --font-body: 'DM Sans', sans-serif;
      --radius: 16px; --shadow: 0 4px 24px rgba(26,24,20,0.08);
      --shadow-lg: 0 12px 48px rgba(26,24,20,0.12);
    }
    body {
      font-family: var(--font-body);
      background: var(--warm-white);
      color: var(--ink);
      line-height: 1.7;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .header {
      text-align: center;
      margin-bottom: 40px;
      padding: 20px;
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .header h1 {
      font-family: var(--font-display);
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--teal);
      margin-bottom: 10px;
    }
    .header p {
      color: var(--ink-muted);
      font-size: 1.1rem;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .stat-card {
      background: white;
      padding: 24px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      text-align: center;
      border: 2px solid transparent;
    }
    .stat-card.resolved { border-color: var(--green); }
    .stat-card.pending { border-color: var(--yellow); }
    .stat-number {
      font-family: var(--font-display);
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .stat-label {
      font-size: 1rem;
      color: var(--ink-muted);
      font-weight: 500;
    }
    .issues-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 24px;
    }
    .issue-card {
      background: white;
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      border-left: 4px solid var(--teal);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .issue-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }
    .issue-card.resolved {
      border-left-color: var(--green);
      background: linear-gradient(135deg, rgba(40, 167, 69, 0.05) 0%, rgba(40, 167, 69, 0.02) 100%);
    }
    .issue-card.pending {
      border-left-color: var(--yellow);
      background: linear-gradient(135deg, rgba(255, 193, 7, 0.05) 0%, rgba(255, 193, 7, 0.02) 100%);
    }
    .issue-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .issue-id {
      background: var(--teal);
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      font-family: var(--font-display);
    }
    .issue-status {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .issue-status.resolved {
      background: rgba(40, 167, 69, 0.1);
      color: var(--green);
    }
    .issue-status.pending {
      background: rgba(255, 193, 7, 0.1);
      color: var(--yellow);
    }
    .issue-title {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--ink);
    }
    .issue-description {
      color: var(--ink-muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .severity {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      margin-top: 12px;
    }
    .severity.high { background: rgba(220, 53, 69, 0.1); color: var(--red); }
    .severity.medium { background: rgba(255, 193, 7, 0.1); color: var(--yellow); }
    .severity.low { background: rgba(40, 167, 69, 0.1); color: var(--green); }
    .back-link {
      display: inline-block;
      margin-top: 40px;
      padding: 12px 24px;
      background: var(--teal);
      color: white;
      text-decoration: none;
      border-radius: 30px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .back-link:hover {
      background: var(--teal-light);
    }
    .loading {
      text-align: center;
      padding: 40px;
      font-size: 1.2rem;
      color: var(--ink-muted);
    }
    @media (max-width: 768px) {
      .issues-grid {
        grid-template-columns: 1fr;
      }
      .stats {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🔧 Issues Tracker</h1>
    <p>Tracking the 10 major problems that were identified and resolved in EduDesk AI</p>
  </div>

  <div class="stats">
    <div class="stat-card resolved">
      <div class="stat-number" id="resolved-count">0</div>
      <div class="stat-label">Resolved Issues</div>
    </div>
    <div class="stat-card pending">
      <div class="stat-number" id="pending-count">0</div>
      <div class="stat-label">Pending Issues</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="total-count">10</div>
      <div class="stat-label">Total Issues</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="completion-rate">0%</div>
      <div class="stat-label">Completion Rate</div>
    </div>
  </div>

  <div class="loading">Loading issues...</div>

  <div class="issues-grid" id="issues-grid" style="display: none;"></div>

  <div style="text-align: center;">
    <a href="/" class="back-link">← Back to EduDesk AI</a>
  </div>

  <script>
    async function loadIssues() {
      try {
        const response = await fetch('/issues');
        const data = await response.json();

        // Update stats
        document.getElementById('resolved-count').textContent = data.resolvedIssues;
        document.getElementById('pending-count').textContent = data.pendingIssues;
        document.getElementById('total-count').textContent = data.totalIssues;
        document.getElementById('completion-rate').textContent = Math.round((data.resolvedIssues / data.totalIssues) * 100) + '%';

        // Render issues
        const issuesGrid = document.getElementById('issues-grid');
        issuesGrid.innerHTML = '';

        data.issues.forEach(issue => {
          const issueCard = document.createElement('div');
          issueCard.className = `issue-card ${issue.status}`;

          issueCard.innerHTML = `
            <div class="issue-header">
              <span class="issue-id">#${issue.id}</span>
              <span class="issue-status ${issue.status}">${issue.status}</span>
            </div>
            <h3 class="issue-title">${issue.title}</h3>
            <p class="issue-description">${issue.description}</p>
            <span class="severity ${issue.severity}">${issue.severity} priority</span>
          `;

          issuesGrid.appendChild(issueCard);
        });

        // Hide loading, show issues
        document.querySelector('.loading').style.display = 'none';
        issuesGrid.style.display = 'grid';

      } catch (error) {
        console.error('Error loading issues:', error);
        document.querySelector('.loading').textContent = 'Error loading issues. Please try again.';
      }
    }

    // Load issues when page loads
    loadIssues();
  </script>
</body>
</html></content>
